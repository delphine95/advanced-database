<html>
    <head>
        <title>Pet List</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
<body><h1>Pets</h1>
<hr/>
<table class="table table-bordered table-striped table-hover">
<style>
td, th {
    padding: 12px 20px;
}
</style>

    <tr>
        
        <th>ID</th>
        <th>Name</th>
        <th>Kind</th>
        <th>Age</th>
        <th>Food</th>
        <th>Weight</th>
        </tr>
        {% for pet in pets %}
        <tr>
            {% for item in pet %}
            <td>{{ item }}</td>
            {% endfor %}
             <td><a href="/update/{{pet[0]}}"><span class="material-symbols-outlined">edit</span></a></td>
             <td><a href="/delete/{{pet[0]}}">Delete</a></td>
        </tr>
        {% endfor %}
        </table>
        <hr/>
        <a href="/create">Create a new pet</a>

    </body>


</html>
